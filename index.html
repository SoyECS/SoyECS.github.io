<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dairy & Marco</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============================================================
       CABECERA — foto del negocio y nombre
       ============================================================ -->
  <header class="site-header">

    <div class="hero-image-wrapper">
      <img src="img/portada.jpeg" alt="Foto del negocio" class="hero-image" />
      <div class="hero-overlay"></div>
    </div>

    <div class="business-name-wrap">
      <h1 class="business-name">
        <span class="name-main">Dairy &amp; Marco</span>
        <span class="name-sub"></span>
      </h1>
    </div>

  </header>


  <!-- ============================================================
       MENÚ DE CATEGORÍAS
       ============================================================ -->
  <nav class="category-nav" role="tablist" aria-label="Categorías del menú">
    <button class="cat-btn active" data-target="dulces"  role="tab" aria-selected="true"  aria-controls="product-grid">Dulces</button>
    <button class="cat-btn"        data-target="bebidas" role="tab" aria-selected="false" aria-controls="product-grid">Bebidas</button>
    <button class="cat-btn"        data-target="otros"   role="tab" aria-selected="false" aria-controls="product-grid">Otros</button>
  </nav>


  <!-- ============================================================
       CUADRÍCULA DE PRODUCTOS
       Cada <article> necesita:
         data-category → "dulces", "bebidas" u "otros"
         data-name     → nombre en el mensaje de WhatsApp
         data-price    → precio numérico sin símbolo (ej: 130.00)
       ============================================================ -->
  <main id="product-grid" class="product-grid" role="tabpanel">

    <!-- ── DULCES ─────────────────────────────────────────────── -->

    <article class="product-card" data-category="dulces" data-name="Maní Molido" data-price="110.00">
      <img src="img/maniC.jpg" alt="Maní Molido" class="product-img" />
      <div class="product-info">
        <h2 class="product-name">Maní Molido</h2>
        <p class="product-price">$120.00</p>
        <div class="qty-control">
          <button class="qty-btn qty-minus" aria-label="Restar">−</button>
          <span class="qty-value">0</span>
          <button class="qty-btn qty-plus" aria-label="Sumar">+</button>
        </div>
      </div>
    </article>

    <article class="product-card" data-category="dulces" data-name="Cremita de Leche" data-price="60.00">
      <img src="img/cremitaLeche.webp" alt="cremita de leche" class="product-img" />
      <div class="product-info">
        <h2 class="product-name">Cremita de Leche</h2>
        <p class="product-price">$60.00</p>
        <div class="qty-control">
          <button class="qty-btn qty-minus" aria-label="Restar">−</button>
          <span class="qty-value">0</span>
          <button class="qty-btn qty-plus" aria-label="Sumar">+</button>
        </div>
      </div>
    </article>
    

    <!-- ── BEBIDAS ────────────────────────────────────────────── -->

    <article class="product-card" data-category="bebidas" data-name="Refresco de Lata Naranja" data-price="250.00">
      <img src="img/refrescoLataNaranja.jpg" alt="Refresco de Lata Naranja" class="product-img" />
      <div class="product-info">
        <h2 class="product-name">Refresco de Lata Naranja</h2>
        <p class="product-price">$250.00</p>
        <div class="qty-control">
          <button class="qty-btn qty-minus" aria-label="Restar">−</button>
          <span class="qty-value">0</span>
          <button class="qty-btn qty-plus" aria-label="Sumar">+</button>
        </div>
      </div>
    </article>

    <!-- ── OTROS ──────────────────────────────────────────────── -->

    <!--<article class="product-card" data-category="otros" data-name="Producto de Ejemplo" data-price="100.00">
      <img src="https://placehold.co/400x300/1a2a0e/96c86e?text=Ejemplo" alt="Ejemplo de producto" class="product-img" />
      <div class="product-info">
        <h2 class="product-name">Producto de Ejemplo</h2>
        <p class="product-price">$100.00</p>
        <div class="qty-control">
          <button class="qty-btn qty-minus" aria-label="Restar">−</button>
          <span class="qty-value">0</span>
          <button class="qty-btn qty-plus" aria-label="Sumar">+</button>
        </div>
      </div>
    </article>
-->
  </main>


  <!-- ============================================================
       BARRA FLOTANTE DE PEDIDO
       Aparece cuando hay al menos 1 producto seleccionado.
       ★ Cambia data-phone por tu número: código de país + número sin espacios.
         Cuba ejemplo: "5359638868"
       ============================================================ -->
  <div class="order-bar" id="order-bar" aria-live="polite" aria-hidden="true">
    <div class="order-bar-info">
      <span class="order-count" id="order-count">0 artículos</span>
      <span class="order-total" id="order-total">$0.00</span>
    </div>
    <button class="whatsapp-btn" id="whatsapp-btn" data-phone="5359638868">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar pedido
    </button>
  </div>


  <!-- ============================================================
       MODAL — DATOS DEL CLIENTE
       Se abre al pulsar "Enviar pedido". El cliente llena sus datos
       y luego se envía todo por WhatsApp.

       PARA AGREGAR MÁS CAMPOS: copia un bloque <div class="field-group">
       y pégalo aquí arriba del párrafo <p class="modal-error">.
       Cambia el id, el label y el placeholder.
       Si el campo es obligatorio, agrégalo también en la validación del JS.
       ============================================================ -->
  
      <!-- ──────────────────────────────────────────────────────
           CAMPO EXTRA: Notas del pedido (opcional)
           Para hacerlo obligatorio: añade  || !notas  en la
           validación del JS (busca el comentario marcado con ★)
           ────────────────────────────────────────────────────── -->
      <!-- ============================================================
       MODAL — DATOS DEL CLIENTE
       ============================================================ -->
<div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <button class="modal-close" id="modal-close" aria-label="Cerrar">✕</button>

    <h2 class="modal-title" id="modal-title">Tus datos de entrega</h2>
    <p class="modal-subtitle">Necesitamos estos datos para enviarte tu pedido.</p>

    <!-- Campo: Nombre -->
    <div class="field-group">
      <label class="field-label" for="input-nombre">👤 Tu nombre</label>
      <input class="field-input" id="input-nombre" type="text" placeholder="Ej. María García" autocomplete="name" />
    </div>

    <!-- Campo: Teléfono -->
    <div class="field-group">
      <label class="field-label" for="input-tel">📞 Tu número de teléfono</label>
      <input class="field-input" id="input-tel" type="tel" placeholder="Ej. 5963-8868" autocomplete="tel" />
    </div>

    <!-- Campo: Dirección con botón de ayuda -->
<div class="field-group">
  <div style="display: flex; align-items: center; justify-content: space-between;">
    <label class="field-label" for="input-dir">📍 Dirección de entrega</label>
    <button type="button" class="help-btn" id="help-dir-btn" aria-label="Ayuda">❕</button>
  </div>
  <input class="field-input" id="input-dir" type="text" placeholder="Ej. Reparto José Martí, calle 13 #45" autocomplete="street-address" />
</div>

    <!-- Campo: Número de Tarjeta (OBLIGATORIO) -->
    <div class="field-group">
      <label class="field-label" for="input-tarjeta">💳 Número de Tarjeta</label>
      <input class="field-input" id="input-tarjeta" type="text" placeholder="Ej. 9244-XXXX-XXXX-6256" autocomplete="off" />
    </div>

    <!-- Mensaje de error — aparece si faltan campos obligatorios -->
    <p class="modal-error" id="modal-error" aria-live="assertive"></p>

    <!-- Botón de envío -->
    <button class="modal-send-btn" id="modal-send-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar pedido por WhatsApp
    </button>

  </div>
</div>

  <!-- ============================================================
       PIE DE PÁGINA
       ============================================================ -->
  <footer class="site-footer">
    <p class="footer-item">
      <span class="footer-icon">📍</span>
      <span>Reparto José Martí</span>
    </p>
    <p class="footer-item">
      <span class="footer-icon">📞</span>
      <span>+53 59638868</span>
    </p>
  </footer>


  <!-- ============================================================
       JAVASCRIPT
       ============================================================ -->
  <script>

    /* ── 1. FILTRO DE CATEGORÍAS ────────────────────────────── */
    var catBtns = document.querySelectorAll('.cat-btn');
    var cards   = document.querySelectorAll('.product-card');

    catBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        catBtns.forEach(function(b) {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        var target = btn.getAttribute('data-target');
        cards.forEach(function(card) {
          card.classList.toggle('hidden', card.getAttribute('data-category') !== target);
        });
      });
    });


    /* ── 2. CONTADORES DE CANTIDAD ──────────────────────────── */
    cards.forEach(function(card) {
      var minusBtn = card.querySelector('.qty-minus');
      var plusBtn  = card.querySelector('.qty-plus');
      var qtySpan  = card.querySelector('.qty-value');

      plusBtn.addEventListener('click', function() {
        qtySpan.textContent = parseInt(qtySpan.textContent) + 1;
        card.classList.add('has-qty');
        updateOrderBar();
      });

      minusBtn.addEventListener('click', function() {
        var current = parseInt(qtySpan.textContent);
        if (current > 0) {
          qtySpan.textContent = current - 1;
          if (current - 1 === 0) card.classList.remove('has-qty');
          updateOrderBar();
        }
      });
    });


    /* ── 3. BARRA DE PEDIDO Y TOTAL ─────────────────────────── */
    var orderBar   = document.getElementById('order-bar');
    var orderCount = document.getElementById('order-count');
    var orderTotal = document.getElementById('order-total');
    var waBtn      = document.getElementById('whatsapp-btn');

    function calcTotals() {
      var items = 0, price = 0;
      cards.forEach(function(card) {
        var qty = parseInt(card.querySelector('.qty-value').textContent);
        items += qty;
        price += qty * parseFloat(card.getAttribute('data-price'));
      });
      return { items: items, price: price };
    }

    function updateOrderBar() {
      var t = calcTotals();
      orderCount.textContent = t.items + (t.items === 1 ? ' artículo' : ' artículos');
      orderTotal.textContent = '$' + t.price.toFixed(2);
      orderBar.classList.toggle('visible', t.items > 0);
      orderBar.setAttribute('aria-hidden', t.items > 0 ? 'false' : 'true');
    }


    /* ── 4. MODAL — abrir / cerrar ──────────────────────────── */
    var backdrop   = document.getElementById('modal-backdrop');
    var modalClose = document.getElementById('modal-close');

    // Abrir modal al pulsar "Enviar pedido"
    waBtn.addEventListener('click', function() {
      backdrop.classList.add('open');
      backdrop.setAttribute('aria-hidden', 'false');
      document.getElementById('input-nombre').focus();
    });

    // Cerrar al pulsar la X
    modalClose.addEventListener('click', closeModal);

    // Cerrar al hacer clic fuera del cuadro
    backdrop.addEventListener('click', function(e) {
      if (e.target === backdrop) closeModal();
    });

    function closeModal() {
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden', 'true');
      document.getElementById('modal-error').textContent = '';
    }

    /* ── 5. ENVIAR PEDIDO POR WHATSAPP ───────────────────────── */
var sendBtn = document.getElementById('modal-send-btn');
if (sendBtn) {
  sendBtn.addEventListener('click', function() {
    // Obtener valores de los campos
    var nombre  = document.getElementById('input-nombre').value.trim();
    var tel     = document.getElementById('input-tel').value.trim();
    var dir     = document.getElementById('input-dir').value.trim();
    var tarjeta = document.getElementById('input-tarjeta').value.trim();
    var errorEl = document.getElementById('modal-error');

    // Validar campos obligatorios (incluyendo tarjeta)
    if (!nombre || !tel || !dir || !tarjeta) {
      if (errorEl) errorEl.textContent = '⚠️ Por favor completa todos los campos (nombre, teléfono, dirección y número de tarjeta).';
      return;
    }
    if (errorEl) errorEl.textContent = '';

    // Obtener productos seleccionados
    var cards = document.querySelectorAll('.product-card');
    var lineas = [];
    var total = 0;

    cards.forEach(function(card) {
      var qtySpan = card.querySelector('.qty-value');
      if (qtySpan) {
        var qty = parseInt(qtySpan.textContent);
        if (qty > 0) {
          var name = card.getAttribute('data-name');
          var price = parseFloat(card.getAttribute('data-price'));
          lineas.push(qty + 'x ' + name);
          total += qty * price;
        }
      }
    });

    // Construir mensaje
    var msg = '---------------------------' +
              '\nCliente: ' + nombre + '\n' +
              'Número: ' + tel + '\n' +
              'Dirección: ' + dir + '\n' +
              'Tarjeta Nº: ' + tarjeta + '\n' +
              '---------------------------' + '\n' +
              'Pedido:\n' + lineas.join('\n') + '\n---------------------------' +'\nTotal: $' + total.toFixed(2);

    // Obtener número de WhatsApp
    var waBtn = document.getElementById('whatsapp-btn');
    var phone = waBtn ? waBtn.getAttribute('data-phone') : '5359638868';
    var url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);

    // Abrir WhatsApp
    window.open(url, '_blank');

    // Cerrar modal
    closeModal();
  });
}

/* ── 6. GUARDAR Y CARGAR DATOS DEL CLIENTE ─────────────────── */

// IDs de los campos que queremos guardar
var camposCliente = ['input-nombre', 'input-tel', 'input-dir', 'input-tarjeta'];

// Función para guardar todos los campos en localStorage
function guardarDatosCliente() {
  camposCliente.forEach(function(id) {
    var campo = document.getElementById(id);
    if (campo) {
      localStorage.setItem(id, campo.value);
    }
  });
}

// Función para cargar los datos guardados
function cargarDatosCliente() {
  camposCliente.forEach(function(id) {
    var campo = document.getElementById(id);
    if (campo) {
      var valorGuardado = localStorage.getItem(id);
      if (valorGuardado) {
        campo.value = valorGuardado;
      }
    }
  });
}

// Guardar automáticamente cuando el usuario escribe en cualquier campo
camposCliente.forEach(function(id) {
  var campo = document.getElementById(id);
  if (campo) {
    campo.addEventListener('input', guardarDatosCliente);
  }
});

// Cargar los datos cuando se abre el modal
var modalBackdrop = document.getElementById('modal-backdrop');
if (modalBackdrop) {
  // Observar cuando el modal se abre
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
      if (mutation.attributeName === 'class') {
        if (modalBackdrop.classList.contains('open')) {
          cargarDatosCliente();
        }
      }
    });
  });
  observer.observe(modalBackdrop, { attributes: true });
}

/* ── 7. BOTÓN DE AYUDA PARA LA DIRECCIÓN (VERSIÓN CORREGIDA) ── */

// Esperar a que todo el HTML esté cargado
document.addEventListener('DOMContentLoaded', function() {
  
  var helpBtn = document.getElementById('help-dir-btn');
  
  if (helpBtn) {
    helpBtn.addEventListener('click', function(e) {
      e.preventDefault();
      alert('📍 CONSEJO PARA TU DIRECCIÓN 📍\n\n' +
            'Escribe tu dirección lo más clara posible:\n\n' +
            '✓ Edificio, Manzana y Apartamento\n' +
            '✓ Puntos de referencia (escuela, parque, tienda)\n\n' +
            '📌 Ejemplo:\n' +
            '"Edificio 111, Manzana 15, Apartamento 2"\n\n' +
            '¡Así recibirás tu pedido sin demoras!');
    });
  } else {
    console.log('No se encontró el botón con id="help-dir-btn"');
  }
  
});
    
  </script>

</body>
</html>
