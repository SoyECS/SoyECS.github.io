<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================================
       TÍTULO DE LA PESTAÑA DEL NAVEGADOR
       Cambia "Mi Negocio" por el nombre real de tu negocio
       ============================================================ -->
  <title>Mi Negocio</title>

  <!-- Fuentes de Google (no necesitas cambiar esto) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <!-- Enlace al archivo de estilos -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============================================================
       SECCIÓN: CABECERA / HERO DEL NEGOCIO
       ============================================================ -->
  <header class="site-header">

    <!-- ----------------------------------------------------------
         FOTO DEL NEGOCIO (banner / portada)
         Reemplaza "https://placehold.co/1200x400/2d2d2d/888?text=Tu+Foto+Aquí"
         con la ruta a tu propia imagen, por ejemplo: "imagenes/portada.jpg"
         ---------------------------------------------------------- -->
    <div class="hero-image-wrapper">
      <img
        src="img/cover.jpg"
        alt="Foto del negocio"
        class="hero-image"
      />
      <!-- Capa oscura decorativa sobre la imagen (se controla desde CSS) -->
      <div class="hero-overlay"></div>
    </div>

    <!-- ----------------------------------------------------------
         NOMBRE DEL NEGOCIO
         Cambia el texto entre las etiquetas <span> por el nombre real
         ---------------------------------------------------------- -->
    <div class="business-name-wrap">
      <h1 class="business-name">
        <span class="name-main">Dairy & Marco</span>
        <span class="name-sub">Sabor &amp; Tradición</span>
      </h1>
    </div>

  </header>
  <!-- FIN: CABECERA -->


  <!-- ============================================================
       SECCIÓN: MENÚ DE CATEGORÍAS
       Los botones cambian la categoría activa (Comida / Bebidas / Otros)
       NO necesitas tocar este bloque salvo que quieras renombrar alguna
       categoría; si lo haces, también actualiza el atributo data-category
       en los artículos de productos más abajo.
       ============================================================ -->
  <nav class="category-nav" role="tablist" aria-label="Categorías del menú">

    <!-- Botón Comida — data-target debe coincidir con data-category de los productos -->
    <button
      class="cat-btn active"
      data-target="dulces"
      role="tab"
      aria-selected="true"
      aria-controls="product-grid"
    >
      Dulces
    </button>

    <!-- Botón Bebidas -->
    <button
      class="cat-btn"
      data-target="bebidas"
      role="tab"
      aria-selected="false"
      aria-controls="product-grid"
    >
      Bebidas
    </button>

    <!-- Botón Otros -->
    <button
      class="cat-btn"
      data-target="otros"
      role="tab"
      aria-selected="false"
      aria-controls="product-grid"
    >
      Otros
    </button>

  </nav>
  <!-- FIN: MENÚ DE CATEGORÍAS -->


  <!-- ============================================================
       SECCIÓN: CUADRÍCULA DE PRODUCTOS
       Cada <article> es un producto. Puedes copiar y pegar un bloque
       completo para agregar más productos.
       ============================================================ -->
  <main id="product-grid" class="product-grid" role="tabpanel">

    <!-- ==========================================================
         ★ PRODUCTOS — CATEGORÍA: COMIDA
         data-category="comida" los vincula al botón Comida
         ========================================================== -->

    <!-- PRODUCTO 1 — COMIDA -->
    <article class="product-card" data-category="dulces">
      <!-- Imagen del producto:
           Reemplaza el src por la ruta de tu imagen, ej: "imagenes/tacos.jpg"
           Cambia el alt por una descripción real del platillo -->
      <img
        src="img/maniC.jpg"
        alt=""
        class="product-img"
      />
      <div class="product-info">
        <!-- Nombre del producto -->
        <h2 class="product-name">Maní Cocinado</h2>
        <!-- Precio del producto -->
        <p class="product-price">$130.00</p>
      </div>
    </article>
    
    <!-- Segundo Producto ----------------------->
    <article class="product-card" data-category="dulces">
      <!-- Imagen del producto:
           Reemplaza el src por la ruta de tu imagen, ej: "imagenes/tacos.jpg"
           Cambia el alt por una descripción real del platillo -->
      <img
        src="img/maniC.jpg"
        alt=""
        class="product-img"
      />
      <div class="product-info">
        <!-- Nombre del producto -->
        <h2 class="product-name">Maní Molido</h2>
        <!-- Precio del producto -->
        <p class="product-price">$110.00</p>
      </div>
    </article>

    <!-- ==========================================================
         ★ PRODUCTOS — CATEGORÍA: BEBIDAS
         ========================================================== -->

    <!-- PRODUCTO 1 — BEBIDAS -->
    <article class="product-card" data-category="bebidas">
      <img
        src=""
        alt=""
        class="product-img"
      />
      <div class="product-info">
        <h2 class="product-name">Refresco de Lata</h2>
        <p class="product-price">$250.00</p>
      </div>
    </article>

    <!-- ==========================================================
         ★ PRODUCTOS — CATEGORÍA: OTROS
         ========================================================== -->

    <!-- PRODUCTO 1 — OTROS -->
    <article class="product-card" data-category="otros">
      <img
        src=""
        alt=""
        class="product-img"
      />
      <div class="product-info">
        <h2 class="product-name">Salsa Casera</h2>
        <p class="product-price">$40.00</p>
      </div>
    </article>
    
  </main>
  <!-- FIN: CUADRÍCULA DE PRODUCTOS -->


  <!-- ============================================================
       SECCIÓN: PIE DE PÁGINA — DIRECCIÓN Y TELÉFONO
       Cambia los textos dentro de los <span> por tus datos reales
       ============================================================ -->
  <footer class="site-footer">

    <!-- Icono + dirección -->
    <p class="footer-item">
      <span class="footer-icon">📍</span>
      <!-- CAMBIA AQUÍ la dirección de tu negocio -->
      <span>Reparto José Martí</span>
    </p>

    <!-- Icono + teléfono -->
    <p class="footer-item">
      <span class="footer-icon">📞</span>
      <!-- CAMBIA AQUÍ tu número de teléfono -->
      <span>+53 59638868</span>                      
    </p>

  </footer>
  <!-- FIN: PIE DE PÁGINA -->


  <!-- ============================================================
       JAVASCRIPT INLINE MÍNIMO
       Solo se encarga de mostrar/ocultar productos al hacer clic
       en los botones del menú. No necesitas modificarlo.
       ============================================================ -->
      
  <script>
    // Seleccionamos todos los botones de categoría
    const buttons = document.querySelectorAll('.cat-btn');
    // Seleccionamos todas las tarjetas de producto
    const cards   = document.querySelectorAll('.product-card');

    buttons.forEach(function(btn) {
      btn.addEventListener('click', function() {

        // 1. Quitar la clase "active" de todos los botones
        buttons.forEach(function(b) {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });

        // 2. Marcar el botón pulsado como activo
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');

        // 3. Obtener la categoría del botón pulsado
        var target = btn.getAttribute('data-target');

        // 4. Mostrar solo los productos de esa categoría
        cards.forEach(function(card) {
          if (card.getAttribute('data-category') === target) {
            card.classList.remove('hidden');
          } else {
            card.classList.add('hidden');
          }
        });

      });
    });
    
  </script>

</body>
</html>
